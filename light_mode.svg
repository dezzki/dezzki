<style>
    .bg { fill: #ffffff; rx: 8px; }
    .term-window { fill: #f6f8fa; rx: 6px; }
    .text-base { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 13px; fill: #24292f; line-height: 1.5; }
    .user { fill: #0550ae; font-weight: bold; }
    .accent { fill: #cf222e; }
    .dim { fill: #57606a; }
    .highlight { fill: #0969da; }
  </style>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Terminal Header Title -->
  <text x="35" y="40" class="text-base dim">corpxe / <tspan font-weight="bold" fill="#c9d1d9">README.md</tspan></text>

  <!-- Main Terminal Box -->
  <rect x="35" y="65" width="670" height="340" class="term-window" />

  <!-- Left Side: Custom Spider-Man ASCII Art Vector -->
  <g class="user" transform="translate(60, 105)">
    <text font-family="monospace" font-size="12px" xml:space="preserve">
   .-''''''-.
 .'  __  __  '.
/   /  \/  \   \
|   \  /\  /   |
|    '-' '-'   |
 \    ____    /
  '.  \  /  .'
    '-.__.-'   
   /        \  
  /  /\  /\  \ 
 /  /  \/  \  \
|  |   ||   |  |
 \  \  ||  /  /
  '. \ || / .' 
    '-.||.-'   
    </text>
  </g>

  <!-- Right Side: Your Customized System Fetch Stats -->
  <g class="text-base" transform="translate(260, 110)">
    <!-- Header -->
    <text x="0" y="0"><tspan class="user">corpxe@archlinux</tspan> <tspan class="dim">----------------------------------------</tspan></text>
    
    <!-- System Specs -->
    <text x="0" y="20"><tspan class="accent">OS:</tspan><tspan class="dim"> .............................</tspan> Arch Linux</text>
    <text x="0" y="38"><tspan class="accent">Shell:</tspan><tspan class="dim"> ..........................</tspan> fish shell</text>
    <text x="0" y="56"><tspan class="accent">Uptime:</tspan><tspan class="dim"> .........................</tspan> [Your Age / Coding Journey Duration]</text>
    <text x="0" y="74"><tspan class="accent">IDE:</tspan><tspan class="dim"> ............................</tspan> VS Code / Neovim</text>
    
    <!-- Languages -->
    <text x="0" y="105"><tspan class="accent">Languages.Programming:</tspan><tspan class="dim"> ..........</tspan> Python (OOP), C++</text>
    <text x="0" y="123"><tspan class="accent">Languages.Data:</tspan><tspan class="dim"> .................</tspan> JSON, Markdown, YAML</text>
    
    <!-- Hobbies -->
    <text x="0" y="154"><tspan class="accent">Hobbies.Software:</tspan><tspan class="dim"> ...............</tspan> Automation Scripts, Algorithmic Challenges</text>
    <text x="0" y="172"><tspan class="accent">Hobbies.Hardware:</tspan><tspan class="dim"> ...............</tspan> Microcontrollers (ESP32, Arduino)</text>
    
    <!-- Contact Section -->
    <text x="0" y="205"><tspan class="dim">- Contact ---------------------------------------------------</tspan></text>
    <text x="0" y="225"><tspan class="accent">Email:</tspan><tspan class="dim"> ..........................</tspan> your.email@example.com</text>
    <text x="0" y="243"><tspan class="accent">GitHub:</tspan><tspan class="dim"> .........................</tspan> github.com/yourusername</text>
  </g>
</svg>
